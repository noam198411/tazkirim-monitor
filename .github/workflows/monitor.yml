name: Tazkirim Monitor

on:
  schedule:
    # Every 10 minutes. Keep this cron stable — frequent edits can break registration.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: Send notification even if already sent today (for manual testing)
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          playwright install --with-deps chromium

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: data/state.db
          key: tazkirim-monitor-state-v1
          restore-keys: |
            tazkirim-monitor-state-

      - name: Run monitor
        env:
          NTFY_SERVER: https://ntfy.sh
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_PRIORITY: "4"
          LOG_LEVEL: INFO
          STATE_DB_PATH: ./data/state.db
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_notify }}" = "true" ]; then
            ARGS="--force-empty-notify"
          fi
          python -m tazkirim_monitor $ARGS
